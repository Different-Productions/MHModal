name: MHModalExample
options:
  bundleIdPrefix: com.differentproductions
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "17.0"

packages:
  MHModal:
    path: ../

targets:
  MHModalExample:
    type: application
    platform: iOS
    sources:
      - MHModalExample
    dependencies:
      - package: MHModal
    settings:
      base:
        SWIFT_VERSION: "6.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.differentproductions.mhmodal.example
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
