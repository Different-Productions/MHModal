# This workflow will build a Swift project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-swift

name: Swift

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: macos-26

    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: xcodebuild build -scheme MHModal -destination 'platform=iOS Simulator,name=iPhone 17 Pro'
    - name: Run tests
      run: xcodebuild test -scheme MHModal -destination 'platform=iOS Simulator,name=iPhone 17 Pro'
